<style>
  *, *::before, *::after { box-sizing:border-box; }
  html, body { background:#FBFAF7; color:#0E0E10; overflow-x:hidden; }
  body { font-family:'Noto Sans JP', system-ui, sans-serif; -webkit-font-smoothing:antialiased; font-feature-settings:"palt"; }
  .font-jp-serif { font-family:'Noto Serif JP', serif; }
  .label-side { font-family:'JetBrains Mono', ui-monospace, monospace; letter-spacing:0.18em; font-size:11px; color:#8E6F38; }
  .wrap-anywhere { overflow-wrap:anywhere; }
  .hairline { background: #E6E2D8; }
  .gold-line { background: linear-gradient(90deg, transparent, #B89556 18%, #B89556 82%, transparent); }
  .btn-gold {
    background:#0E0E10; color:#FBFAF7;
    border:1px solid #0E0E10;
    transition: all .25s ease;
  }
  .btn-gold:hover { background:#B89556; border-color:#B89556; color:#0E0E10; }
  .btn-ghost {
    background:transparent; color:#0E0E10; border:1px solid #0E0E10;
    transition: all .25s ease;
  }
  .btn-ghost:hover { background:#0E0E10; color:#FBFAF7; }
  .card {
    background:#fff; border:1px solid #E6E2D8;
    transition: border-color .3s ease, transform .3s ease, box-shadow .3s ease;
  }
  .card:hover {
    border-color:#B89556;
    box-shadow: 0 12px 40px -24px rgba(184,149,86,0.45);
  }
  .fade-in { opacity:0; transform: translateY(8px); transition: opacity .8s ease, transform .8s ease; }
  .fade-in.visible { opacity:1; transform:none; }
  /* hero ornamental dome */
  .dome-bg {
    background:
      radial-gradient(ellipse 60% 80% at 50% 60%, rgba(184,149,86,0.10), transparent 70%),
      radial-gradient(ellipse 80% 100% at 50% 50%, rgba(0,0,0,0.04), transparent 70%);
  }
  /* striped placeholder */
  .ph-stripe {
    background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.04) 0 8px, transparent 8px 16px);
  }
  /* nav underline */
  .nav-link { position:relative; }
  .nav-link::after {
    content:""; position:absolute; left:50%; right:50%; bottom:-6px; height:1px;
    background:#B89556; transition: all .3s ease;
  }
  .nav-link:hover::after, .nav-link.active::after { left:0; right:0; }

  /* tiny dotted gold ornament */
  .dot-gold { width:6px; height:6px; border-radius:9999px; background:#B89556; display:inline-block; }

  /* arrow */
  .arrow-right { display:inline-block; transition: transform .3s ease; }
  .group:hover .arrow-right, a:hover .arrow-right, button:hover .arrow-right { transform: translateX(4px); }

  /* section padding */
  .section { padding: 96px 0; }
  @media (max-width: 768px) { .section { padding: 64px 0; } }

  /* container */
  .container-x { width:100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  @media (min-width: 1024px) { .container-x { padding: 0 40px; } }
  .grid > *, .flex > *, .row-with-label > * { min-width:0; }
  @media (max-width: 768px) {
    .container-x { max-width:100vw; }
    .container-x p, .container-x h1, .container-x h2, .container-x h3, .container-x li, .container-x dd {
      max-width:100%;
      overflow-wrap:anywhere;
    }
  }

  /* layout grid w/ side label */
  .row-with-label { display:grid; grid-template-columns: 110px 1fr; gap: 32px; }
  @media (max-width: 768px) {
    .row-with-label { grid-template-columns: 1fr; gap: 16px; }
  }
</style>
